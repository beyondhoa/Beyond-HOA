openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Beyond HOA API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: residents
    description: Resident management
  - name: violations
    description: Violation tracking
  - name: vendors
    description: Vendor directory
  - name: work-orders
    description: Work order tracking
  - name: documents
    description: HOA documents
  - name: dues
    description: Dues and payments
  - name: admin
    description: Admin/board settings
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Log in a resident
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResult"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/me:
    get:
      operationId: getCurrentResident
      tags: [auth]
      summary: Get the currently authenticated resident
      responses:
        "200":
          description: Current resident
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResult"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/change-password:
    post:
      operationId: changePassword
      tags: [auth]
      summary: Change the current resident's password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordInput"
      responses:
        "200":
          description: Password changed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /residents:
    get:
      operationId: listResidents
      tags: [residents]
      summary: List residents
      responses:
        "200":
          description: List of residents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Resident"
    post:
      operationId: createResident
      tags: [residents]
      summary: Create a resident
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResidentInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Resident"

  /residents/{id}:
    put:
      operationId: updateResident
      tags: [residents]
      summary: Update a resident
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResidentUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Resident"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteResident
      tags: [residents]
      summary: Delete a resident
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /residents/{id}/reset-password:
    post:
      operationId: resetResidentPassword
      tags: [residents]
      summary: Reset a resident's password
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Password reset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResetPasswordResult"

  /violations:
    get:
      operationId: listViolations
      tags: [violations]
      summary: List violations
      responses:
        "200":
          description: List of violations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Violation"
    post:
      operationId: createViolation
      tags: [violations]
      summary: Create a violation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ViolationInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Violation"

  /violations/{id}/status:
    put:
      operationId: updateViolationStatus
      tags: [violations]
      summary: Update a violation's status
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ViolationStatusUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Violation"

  /violations/{id}:
    delete:
      operationId: deleteViolation
      tags: [violations]
      summary: Delete a violation
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /violations/analyze-image:
    post:
      operationId: analyzeViolationImage
      tags: [violations]
      summary: Analyze a violation photo with AI
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ViolationImageInput"
      responses:
        "200":
          description: Analysis result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ViolationAnalysis"

  /vendors:
    get:
      operationId: listVendors
      tags: [vendors]
      summary: List vendors
      responses:
        "200":
          description: List of vendors
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Vendor"
    post:
      operationId: createVendor
      tags: [vendors]
      summary: Create a vendor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VendorInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vendor"

  /work-orders:
    get:
      operationId: listWorkOrders
      tags: [work-orders]
      summary: List work orders
      responses:
        "200":
          description: List of work orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WorkOrder"
    post:
      operationId: createWorkOrder
      tags: [work-orders]
      summary: Create a work order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkOrderInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkOrder"

  /work-orders/{id}:
    put:
      operationId: updateWorkOrder
      tags: [work-orders]
      summary: Update a work order
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkOrderUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkOrder"
    delete:
      operationId: deleteWorkOrder
      tags: [work-orders]
      summary: Delete a work order
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /documents:
    get:
      operationId: listDocuments
      tags: [documents]
      summary: List documents
      responses:
        "200":
          description: List of documents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Document"
    post:
      operationId: createDocument
      tags: [documents]
      summary: Create a document
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DocumentInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"

  /documents/{id}:
    put:
      operationId: updateDocument
      tags: [documents]
      summary: Update a document
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DocumentUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"
    delete:
      operationId: deleteDocument
      tags: [documents]
      summary: Delete a document
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /dues/stripe-configured:
    get:
      operationId: getDuesStripeConfigured
      tags: [dues]
      summary: Check whether Stripe is configured for dues payments
      responses:
        "200":
          description: Stripe configuration status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StripeConfiguredStatus"

  /dues/checkout:
    post:
      operationId: createDuesCheckout
      tags: [dues]
      summary: Create a Stripe checkout session for dues payment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DuesCheckoutInput"
      responses:
        "200":
          description: Checkout session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DuesCheckoutResult"

  /dues/payments:
    get:
      operationId: listDuesPayments
      tags: [dues]
      summary: List dues payments
      responses:
        "200":
          description: List of dues payments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DuesPayment"

  /dues/payment-status/{sessionId}:
    get:
      operationId: getDuesPaymentStatus
      tags: [dues]
      summary: Get dues payment status by Stripe session id
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Payment status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DuesPayment"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/stripe-status:
    get:
      operationId: getAdminStripeStatus
      tags: [admin]
      summary: Get admin Stripe configuration status
      responses:
        "200":
          description: Stripe status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStripeStatus"

  /admin/stripe-setup:
    post:
      operationId: setupStripe
      tags: [admin]
      summary: Configure Stripe secret key
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StripeSetupInput"
      responses:
        "200":
          description: Stripe configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
    delete:
      operationId: removeStripeSetup
      tags: [admin]
      summary: Remove Stripe secret key configuration
      responses:
        "200":
          description: Stripe configuration removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

components:
  parameters:
    IdParam:
      name: id
      in: path
      required: true
      schema:
        type: integer

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string

    SuccessResponse:
      type: object
      required: [success]
      properties:
        success:
          type: boolean

    Resident:
      type: object
      required: [id, name, unit, status, created_at]
      properties:
        id: { type: integer }
        name: { type: string }
        unit: { type: string }
        email: { type: ["string", "null"] }
        phone: { type: ["string", "null"] }
        status: { type: string, enum: [owner, tenant] }
        move_in_date: { type: ["string", "null"] }
        notes: { type: ["string", "null"] }
        created_at: { type: string, format: date-time }

    ResidentInput:
      type: object
      required: [name, unit, status]
      properties:
        name: { type: string, minLength: 1 }
        unit: { type: string, minLength: 1 }
        email: { type: ["string", "null"] }
        phone: { type: ["string", "null"] }
        status: { type: string, enum: [owner, tenant] }
        move_in_date: { type: ["string", "null"] }
        notes: { type: ["string", "null"] }

    ResidentUpdate:
      type: object
      properties:
        name: { type: string, minLength: 1 }
        unit: { type: string, minLength: 1 }
        email: { type: ["string", "null"] }
        phone: { type: ["string", "null"] }
        status: { type: string, enum: [owner, tenant] }
        move_in_date: { type: ["string", "null"] }
        notes: { type: ["string", "null"] }

    ResetPasswordResult:
      type: object
      required: [success, password]
      properties:
        success: { type: boolean }
        password: { type: string }

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email: { type: string }
        password: { type: string }

    ChangePasswordInput:
      type: object
      required: [currentPassword, newPassword]
      properties:
        currentPassword: { type: string }
        newPassword: { type: string, minLength: 6 }

    AuthResult:
      type: object
      required: [resident, token]
      properties:
        resident:
          $ref: "#/components/schemas/Resident"
        token:
          type: string

    Violation:
      type: object
      required:
        - id
        - resident_name
        - unit
        - violation_type
        - notice_number
        - incident_date
        - description
        - required_action
        - compliance_deadline
        - status
        - created_at
      properties:
        id: { type: integer }
        resident_name: { type: string }
        unit: { type: string }
        violation_type: { type: string }
        notice_number: { type: integer }
        incident_date: { type: string }
        description: { type: string }
        required_action: { type: string }
        compliance_deadline: { type: string }
        fine_amount: { type: ["string", "null"] }
        notes: { type: ["string", "null"] }
        issued_by: { type: ["string", "null"] }
        photo_url: { type: ["string", "null"] }
        assigned_vendor: { type: ["string", "null"] }
        status: { type: string, enum: [open, resolved, appealed] }
        created_at: { type: string, format: date-time }

    ViolationInput:
      type: object
      required:
        - resident_name
        - unit
        - violation_type
        - incident_date
        - description
        - required_action
        - compliance_deadline
      properties:
        resident_name: { type: string, minLength: 1 }
        unit: { type: string, minLength: 1 }
        violation_type: { type: string, minLength: 1 }
        notice_number: { type: integer }
        incident_date: { type: string }
        description: { type: string, minLength: 1 }
        required_action: { type: string, minLength: 1 }
        compliance_deadline: { type: string }
        fine_amount: { type: ["string", "null"] }
        notes: { type: ["string", "null"] }
        issued_by: { type: ["string", "null"] }
        photo_url: { type: ["string", "null"] }
        assigned_vendor: { type: ["string", "null"] }

    ViolationStatusUpdate:
      type: object
      required: [status]
      properties:
        status: { type: string, enum: [open, resolved, appealed] }

    ViolationImageInput:
      type: object
      required: [imageBase64]
      properties:
        imageBase64: { type: string }
        mimeType: { type: string }

    ViolationAnalysis:
      type: object
      required:
        - violation_type
        - description
        - required_action
        - severity
        - compliance_days
        - summary
      properties:
        violation_type: { type: string }
        description: { type: string }
        required_action: { type: string }
        severity: { type: string, enum: [low, medium, high] }
        fine_suggestion: { type: ["number", "null"] }
        compliance_days: { type: integer }
        summary: { type: string }

    Vendor:
      type: object
      required: [id, name, specialty, active, created_at]
      properties:
        id: { type: integer }
        name: { type: string }
        specialty: { type: string }
        phone: { type: ["string", "null"] }
        email: { type: ["string", "null"] }
        active: { type: boolean }
        created_at: { type: string, format: date-time }

    VendorInput:
      type: object
      required: [name, specialty]
      properties:
        name: { type: string, minLength: 1 }
        specialty: { type: string, minLength: 1 }
        phone: { type: ["string", "null"] }
        email: { type: ["string", "null"] }

    WorkOrder:
      type: object
      required:
        - id
        - title
        - resident_name
        - unit
        - category
        - priority
        - description
        - status
        - created_at
        - updated_at
      properties:
        id: { type: integer }
        title: { type: string }
        resident_name: { type: string }
        unit: { type: string }
        category: { type: string }
        priority: { type: string }
        description: { type: string }
        status: { type: string, enum: [submitted, "in-progress", completed, cancelled] }
        board_notes: { type: ["string", "null"] }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    WorkOrderInput:
      type: object
      required: [title, resident_name, unit, category, description]
      properties:
        title: { type: string, minLength: 1 }
        resident_name: { type: string, minLength: 1 }
        unit: { type: string, minLength: 1 }
        category: { type: string, minLength: 1 }
        priority: { type: string }
        description: { type: string, minLength: 1 }

    WorkOrderUpdate:
      type: object
      properties:
        status: { type: string, enum: [submitted, "in-progress", completed, cancelled] }
        board_notes: { type: ["string", "null"] }
        priority: { type: string }

    Document:
      type: object
      required: [id, title, category, doc_date, created_at]
      properties:
        id: { type: integer }
        title: { type: string }
        category: { type: string, enum: [bylaws, rules, minutes, financial, forms, legal] }
        doc_date: { type: string }
        file_size: { type: ["string", "null"] }
        description: { type: ["string", "null"] }
        doc_path: { type: ["string", "null"] }
        created_at: { type: string, format: date-time }

    DocumentInput:
      type: object
      required: [title, category, doc_date]
      properties:
        title: { type: string, minLength: 1 }
        category: { type: string, enum: [bylaws, rules, minutes, financial, forms, legal] }
        doc_date: { type: string }
        file_size: { type: ["string", "null"] }
        description: { type: ["string", "null"] }
        doc_path: { type: ["string", "null"] }

    DocumentUpdate:
      type: object
      properties:
        title: { type: string, minLength: 1 }
        category: { type: string, enum: [bylaws, rules, minutes, financial, forms, legal] }
        doc_date: { type: string }
        file_size: { type: ["string", "null"] }
        description: { type: ["string", "null"] }
        doc_path: { type: ["string", "null"] }

    StripeConfiguredStatus:
      type: object
      required: [configured]
      properties:
        configured: { type: boolean }

    DuesCheckoutInput:
      type: object
      required: [duesId, period, amount]
      properties:
        duesId: { type: string }
        period: { type: string }
        amount: { type: number }

    DuesCheckoutResult:
      type: object
      required: [url, sessionId]
      properties:
        url: { type: string }
        sessionId: { type: string }

    DuesPayment:
      type: object
      required: [id, dues_id, period, amount, status, created_at]
      properties:
        id: { type: integer }
        dues_id: { type: string }
        period: { type: string }
        amount: { type: string }
        stripe_session_id: { type: ["string", "null"] }
        stripe_payment_intent_id: { type: ["string", "null"] }
        status: { type: string, enum: [pending, paid, failed] }
        paid_at: { type: ["string", "null"], format: date-time }
        created_at: { type: string, format: date-time }

    AdminStripeStatus:
      type: object
      required: [configured]
      properties:
        configured: { type: boolean }
        hasEnvKey: { type: boolean }
        hasDbKey: { type: boolean }

    StripeSetupInput:
      type: object
      required: [secretKey]
      properties:
        secretKey: { type: string }
