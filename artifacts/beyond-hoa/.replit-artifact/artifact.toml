kind = "mobile"
previewPath = "/"
title = "Beyond HOA"
version = "1.0.0"
id = "artifacts/beyond-hoa"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 25694

[services.development]
run = "pnpm --filter @workspace/beyond-hoa run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/beyond-hoa", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/beyond-hoa", "run", "serve" ]

[services.env]
PORT = "25694"
BASE_PATH = "/"
